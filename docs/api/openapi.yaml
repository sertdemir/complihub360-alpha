openapi: 3.0.0
info:
  title: CompliHub360 API
  description: API for CompliHub360 platform (Architecture Sync)
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /search:
    post:
      summary: Search and Wizard endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country, query]
              properties:
                country:
                  type: string
                query:
                  type: string
                structured_answers:
                  type: object
      responses:
        '200':
          description: Results
          content:
            application/json:
              schema:
                type: object

  /engagement:
    post:
      summary: Create an engagement request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider_key, message, country]
              properties:
                provider_key:
                  type: string
                message:
                  type: string
                structured_answers:
                  type: object
                country:
                  type: string
      responses:
        '200':
          description: Engagement created

  /engagement/{id}:
    get:
      summary: Get engagement status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status retrieved

  /provider/magic/{token}:
    get:
      summary: Provider magic link auth
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /provider/confirm:
    post:
      summary: Confirm engagement
      responses:
        '200':
          description: Confirmed

  /provider/reply:
    post:
      summary: Reply to engagement
      responses:
        '200':
          description: Replied

  /provider/decline:
    post:
      summary: Decline engagement
      responses:
        '200':
          description: Declined

  /document/upload:
    post:
      summary: Upload a raw document
      responses:
        '200':
          description: Uploaded

  /document/request-ai:
    post:
      summary: Request AI processing for a document
      responses:
        '200':
          description: Processed
