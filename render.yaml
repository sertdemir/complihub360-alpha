services:
  - type: web
    name: complihub-api
    env: node
    # Since this is a monorepo, we execute the standard npm install from the root.
    buildCommand: npm install && npm run build --workspace=@complihub/compliance-api
    startCommand: node services/compliance-api/dist/index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    autoDeploy: true
