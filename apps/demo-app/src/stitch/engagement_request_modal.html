<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Engagement Request Modal - CompliHub360</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#137fec",
          "background-light": "#f6f7f8",
          "background-dark": "#101922",
        },
        fontFamily: {
          "display": ["Inter", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
      },
    },
  }
</script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Blurred background effect (simulating underlying page) -->
<div class="absolute inset-0 z-0 bg-slate-950/80 backdrop-blur-md"></div>
<div class="relative z-10 flex flex-col max-w-[560px] w-full mx-4 bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-[16px] shadow-2xl overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-slate-200 dark:border-slate-800">
<h2 class="text-slate-900 dark:text-white text-lg font-semibold tracking-tight">Request Proposal from Acme Compliance</h2>
<button class="text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<!-- Content -->
<div class="p-6 flex flex-col gap-6">
<!-- Context Summary -->
<div class="flex flex-wrap gap-2 p-3 rounded-lg bg-slate-200/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50">
<div class="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-slate-300/50 dark:bg-slate-700 text-sm font-medium text-slate-800 dark:text-slate-200">
<span class="material-symbols-outlined text-[16px] text-primary">public</span>
<span>Market: DE, EU</span>
</div>
<div class="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-slate-300/50 dark:bg-slate-700 text-sm font-medium text-slate-800 dark:text-slate-200">
<span class="material-symbols-outlined text-[16px] text-primary">account_balance</span>
<span>Category: Tax &amp; VAT</span>
</div>
</div>
<!-- Input Area -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="additional-details">Additional Details <span class="text-slate-500 dark:text-slate-500 font-normal">(Optional)</span></label>
<textarea class="form-input w-full resize-y min-h-[120px] rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950/50 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-primary focus:ring-1 focus:ring-primary p-3 text-sm transition-shadow" id="additional-details" placeholder="Add any specific requirements, timelines, or context for the provider..."></textarea>
</div>
<!-- Privacy Notice -->
<div class="flex items-start gap-2 text-slate-500 dark:text-slate-400 text-xs">
<span class="material-symbols-outlined text-[16px] shrink-0">shield</span>
<p>Protected by AI Privacy Gate. Your request is anonymized until you choose to reveal your identity to the provider.</p>
</div>
</div>
<!-- Footer Actions -->
<div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50">
<button class="px-4 py-2 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
      Cancel
    </button>
<button class="px-5 py-2 rounded-lg bg-primary hover:bg-primary/90 text-white text-sm font-semibold shadow-sm transition-colors flex items-center gap-2">
<span>Submit Request</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</div>
</body></html>
